<svg xmlns="http://www.w3.org/2000/svg" width="720" height="160" viewBox="0 0 720 160">
  <defs>
    <linearGradient id="meshGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="720" height="160" fill="#0d1117" rx="12"/>
  <!-- Mesh nodes -->
  <g transform="translate(100,80)" filter="url(#glow)">
    <circle cx="-40" cy="-20" r="12" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
    <circle cx="40" cy="-20" r="12" fill="none" stroke="#3fb950" stroke-width="1.5"/>
    <circle cx="0" cy="20" r="12" fill="none" stroke="#f0883e" stroke-width="1.5"/>
    <line x1="-28" y1="-15" x2="28" y2="-15" stroke="#21262d" stroke-width="1" stroke-dasharray="3"/>
    <line x1="-32" y1="-10" x2="-8" y2="12" stroke="#21262d" stroke-width="1" stroke-dasharray="3"/>
    <line x1="32" y1="-10" x2="8" y2="12" stroke="#21262d" stroke-width="1" stroke-dasharray="3"/>
    <!-- Lock icons inside nodes -->
    <text x="-40" y="-16" text-anchor="middle" font-size="10">🔒</text>
    <text x="40" y="-16" text-anchor="middle" font-size="10">🔒</text>
    <text x="0" y="24" text-anchor="middle" font-size="10">🔒</text>
  </g>
  <!-- Callouts -->
  <text x="200" y="48" fill="#58a6ff" font-family="monospace" font-size="12" font-weight="600">Relay Mode (Store &amp; Forward)</text>
  <text x="200" y="68" fill="#94a3b8" font-family="sans-serif" font-size="12">Encrypted messages stored on volunteer nodes</text>
  <text x="200" y="98" fill="#f0883e" font-family="monospace" font-size="12" font-weight="600">Web Reader (No App Needed)</text>
  <text x="200" y="118" fill="#94a3b8" font-family="sans-serif" font-size="12">Secure link → browser decrypt → reply</text>
  <text x="500" y="48" fill="#3fb950" font-family="monospace" font-size="12" font-weight="600">Local Mesh (Offline)</text>
  <text x="500" y="68" fill="#94a3b8" font-family="sans-serif" font-size="12">Bluetooth / Wi-Fi Direct direct sync</text>
  <text x="500" y="98" fill="#bc8cff" font-family="monospace" font-size="12" font-weight="600">Raspberry Pi Relay</text>
  <text x="500" y="118" fill="#94a3b8" font-family="sans-serif" font-size="12">~1,000 users · ~10K msgs/day per Pi 4</text>
  <line x1="470" y1="30" x2="470" y2="135" stroke="#21262d" stroke-width="1"/>
</svg>